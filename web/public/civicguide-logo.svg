<svg width="720" height="220" viewBox="0 0 720 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CivicGuide logo</title>
  <desc id="desc">A modern shield and navigation mark for CivicGuide.</desc>
  <defs>
    <linearGradient id="cgShield" x1="18" y1="15" x2="185" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.45" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="cgAccent" x1="64" y1="42" x2="158" y2="171" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="0.55" stop-color="#F43F5E"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="cgGlow" x="-20" y="-18" width="240" height="250" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
